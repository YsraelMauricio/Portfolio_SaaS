services:
  # ─── Application Services ───────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: portfolio_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: portfolio_saas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: portfolio_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_saas -d portfolio_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: portfolio_backend
    restart: unless-stopped
    ports:
      - "8000:9000"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: portfolio_saas
      DB_USERNAME: portfolio_saas
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-portfolio-reverb}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-portfolio-reverb-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-portfolio-reverb-secret}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage

  reverb:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: portfolio_reverb
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: portfolio_saas
      DB_USERNAME: portfolio_saas
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-portfolio-reverb}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-portfolio-reverb-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-portfolio-reverb-secret}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "php artisan reverb:start --host=0.0.0.0 --port=8080"

  queue-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: portfolio_queue_worker
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: portfolio_saas
      DB_USERNAME: portfolio_saas
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "php artisan queue:work --tries=3 --timeout=90"

  scheduler:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: portfolio_scheduler
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: portfolio_saas
      DB_USERNAME: portfolio_saas
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: portfolio_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_storage:/var/www/html/storage:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_storage:
    driver: local
